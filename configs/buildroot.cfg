# Buildroot config fragment — appended after qemu_riscv{32,64}_virt_defconfig
# Edit this file to add/remove packages from the buildroot rootfs.
# Applied by: make make_initramfs_buildroot

# --- Output format ---
BR2_TARGET_ROOTFS_CPIO=y
BR2_TARGET_ROOTFS_CPIO_GZIP=y
# Disable ext2 image (default is too small for our packages; we only need cpio)
# BR2_TARGET_ROOTFS_EXT2 is not set

# --- Networking ---
BR2_PACKAGE_OPENSSH=y
BR2_PACKAGE_WGET=y

# --- Debug & system tools ---
BR2_PACKAGE_STRACE=y
BR2_PACKAGE_HTOP=y
BR2_PACKAGE_LSOF=y
BR2_PACKAGE_FILE=y
BR2_PACKAGE_TREE=y

# --- Large packages ---
# BR2_PACKAGE_PYTHON3=y
# !! only `test_qemu_kernel_buildroot` can boot with python3 !!

# --- System ---
# BR2_TARGET_GENERIC_ROOT_PASSWD="root"
